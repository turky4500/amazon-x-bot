name: Amazon Deals Bot Crawler

# إعدادات وقت التشغيل
on:
  schedule:
    # سيقوم البوت بالعمل تلقائياً "كل ساعة" (الدقيقة 0 من كل ساعة)
    - cron: '0 * * * *'
  push:
    branches:
      - main
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً في أي وقت للتحربة

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Amazon Bot
        env:
          # جلب مفتاح التلجرام من الخزنة ليعمل مع الكود
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
