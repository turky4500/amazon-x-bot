name: Amazon Deals Bot Crawler

on:
  schedule:
    # التشغيل التلقائي كل 30 دقيقة لضمان غزارة العروض
    - cron: '*/30 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch: # للتشغيل اليدوي في أي وقت

jobs:
  build:
    runs-on: ubuntu-latest
    name: Amazon Scraper Job

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Amazon Bot
        env:
          # تأكد أن هذا الاسم مطابق لما في الـ Secrets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
        
