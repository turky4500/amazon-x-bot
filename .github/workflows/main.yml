name: Amazon Deals Bot Crawler

on:
  schedule:
    # التعديل الجديد: يعمل كل 30 دقيقة لضمان الاستمرارية وتجاوز زحمة السيرفرات
    - cron: '*/30 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # إضافة "أولوية" للعملية
    name: Run Amazon Deal Scraper
    
    steps:
      # استخدام أحدث الإصدارات لعام 2026 لتجنب التحذيرات
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
        
      - name: Run Amazon Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py
        
