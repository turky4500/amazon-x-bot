name: Amazon Deals Bot Crawler

on:
  push:
    branches:
      - main
  workflow_dispatch: # هذا الزر يسمح لك بتشغيل البوت يدوياً في أي وقت

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Amazon Bot
        env:
          # ربط مفاتيح الخزنة ببيئة تشغيل الكود (مهم جداً)
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          CT0: ${{ secrets.CT0 }}
        run: python bot.py
